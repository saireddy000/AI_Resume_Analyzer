{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:600px;">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Create Account
        </h2>

        <form action="/signup" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                class="btn btn-success w-100">

                Sign Up

            </button>

        </form>

    </div>

</div>

{% endblock %}
