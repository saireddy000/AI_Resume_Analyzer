{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Resume History
    </h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Resume Name</th>

                <th>ATS Score</th>

            </tr>

        </thead>

        <tbody>

            {% for resume in resumes %}

            <tr>

                <td>{{ resume[0] }}</td>

                <td>{{ resume[1] }}</td>

                <td>{{ resume[2] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
