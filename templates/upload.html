{% extends "base.html" %}

{% block content %}

<div class="card shadow p-5">

    <h2 class="text-center mb-4">
        Upload Your Resume
    </h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label">

                Select Resume (PDF/DOCX)

            </label>

            <input
                type="file"
                name="resume"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Upload Resume

        </button>

    </form>

</div>

{% endblock %}
